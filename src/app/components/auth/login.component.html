<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--secondary500)" stroke-width="1.8">
        <path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <h1 class="brand-title">旅行日記</h1>
    </div>

    <h2 class="auth-heading">歡迎回來</h2>
    <p class="auth-sub">登入以查看您的旅程</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          required
        />
      </div>
      <div class="field">
        <label for="password">密碼</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">登入</span>
        <span *ngIf="loading" class="loading-dots">登入中</span>
      </button>
    </form>

    <div class="divider"><span>或</span></div>

    <button class="btn-google" (click)="signInWithGoogle()" [disabled]="loading">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      用 Google 帳號登入
    </button>

    <p class="auth-link">
      還沒有帳號？<a routerLink="/register">立即註冊</a>
    </p>
  </div>
</div>
