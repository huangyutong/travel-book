<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1b3e"/>

  <!-- Open book: left page -->
  <path d="M16 22 Q10 21 6 23 L6 12 Q10 10 16 11 Z"
        fill="rgba(255,255,255,0.92)" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
  <!-- Left page lines -->
  <line x1="8"  y1="14" x2="14" y2="13.2" stroke="rgba(13,27,62,0.35)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="8"  y1="16" x2="14" y2="15.3" stroke="rgba(13,27,62,0.35)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="8"  y1="18" x2="14" y2="17.4" stroke="rgba(13,27,62,0.35)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="8"  y1="20" x2="13" y2="19.5" stroke="rgba(13,27,62,0.35)" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Open book: right page -->
  <path d="M16 22 Q22 21 26 23 L26 12 Q22 10 16 11 Z"
        fill="rgba(255,255,255,0.78)" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
  <!-- Right page lines -->
  <line x1="18" y1="13.2" x2="24" y2="14"   stroke="rgba(13,27,62,0.28)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="18" y1="15.3" x2="24" y2="16"   stroke="rgba(13,27,62,0.28)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="18" y1="17.4" x2="24" y2="18"   stroke="rgba(13,27,62,0.28)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="18" y1="19.5" x2="23" y2="20"   stroke="rgba(13,27,62,0.28)" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Book spine -->
  <line x1="16" y1="11" x2="16" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Paper airplane flying up-right from book -->
  <!-- Body -->
  <path d="M19 10 L29 5 L22 14 Z"
        fill="#f07a5a" stroke="#f07a5a" stroke-width="0.3" stroke-linejoin="round"/>
  <!-- Fold crease -->
  <path d="M19 10 L24.5 9.5 L22 14"
        fill="rgba(0,0,0,0.18)" stroke="none"/>
  <!-- Tail fold -->
  <path d="M22 14 L24.5 9.5"
        stroke="rgba(255,255,255,0.5)" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Motion dots trailing behind airplane -->
  <circle cx="17.5" cy="12"   r="0.7" fill="rgba(240,122,90,0.6)"/>
  <circle cx="16.2" cy="13.5" r="0.5" fill="rgba(240,122,90,0.38)"/>
</svg>
